<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Mundial - CRUD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="header-top">
                <h1 id="appTitle">🌍 Relógio Mundial</h1>
                <button id="langToggle" type="button" class="btn-lang" aria-label="Change language"></button>
            </div>
            <p id="appSubtitle">Digite o nome do país em Português para adicionar.</p>
        </header>

        <form id="addForm" class="form-control" novalidate>
            <input type="text" id="countryInput" placeholder="Ex: Japão, França, Brasil..." autocomplete="off">
            <button id="addBtn" type="submit">Adicionar</button>
        </form>

        <div id="statusMsg" class="status-msg" role="status" aria-live="polite" hidden></div>

        <div id="app" class="clock-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
